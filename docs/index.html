<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Collaboration Protocol</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code@2/styles.min.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI Agent Collaboration Protocol',
      repo: 'https://github.com/Lawrencezeng818/ai-agent-collaboration-protocol',
      loadSidebar: true,
      maxLevel: 3,
      subMaxLevel: 2,
      auto2top: true,
      copyCode: {
        buttonText: 'Copy'
      },
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        depth: 3
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            const url = 'https://github.com/Lawrencezeng818/ai-agent-collaboration-protocol'
            return html
              + '\n\n---\n\n'
              + '<p style="text-align:center;color:#888;font-size:13px;">'
              + '<a href="' + url + '" target="_blank">GitHub</a>'
              + ' · <a href="' + url + '/blob/main/AGENTS.public.md" target="_blank">Source</a>'
              + ' · <a href="' + url + '/issues/new" target="_blank">Feedback</a>'
              + ' · License: CC BY-NC 4.0'
              + '</p>'
          })
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
